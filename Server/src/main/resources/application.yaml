        password: ${CAREERS_MAIL_1_PASSWORD}
      - email: ${CAREERS_MAIL_2_EMAIL}
        password: ${CAREERS_MAIL_2_PASSWORD}
      - email: ${CAREERS_MAIL_3_EMAIL}
        password: ${CAREERS_MAIL_3_PASSWORD}
      - email: ${CAREERS_MAIL_4_EMAIL}
        password: ${CAREERS_MAIL_4_PASSWORD}

