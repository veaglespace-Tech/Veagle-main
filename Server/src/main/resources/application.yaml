spring:
  config:
    import: optional:file:.env[.properties],optional:file:.env.local[.properties]

  application:
    name: VeagleSpaceTech

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

veagle:
  mail:
    smtp:
      host: ${MAIL_HOST}
      port: ${MAIL_PORT}
      ssl-trust: ${MAIL_SSL_TRUST:${MAIL_HOST}}

    otp:
      - email: ${OTP_MAIL_1_EMAIL}
        password: ${OTP_MAIL_1_PASSWORD}
      - email: ${OTP_MAIL_2_EMAIL}
        password: ${OTP_MAIL_2_PASSWORD}
      - email: ${OTP_MAIL_3_EMAIL}
        password: ${OTP_MAIL_3_PASSWORD}

