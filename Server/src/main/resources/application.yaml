spring:
  config:
    import: optional:file:.env[.properties],optional:file:.env.${spring.profiles.active:development}[.properties]

  application:
    name: VeagleSpaceTech

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

veagle:
  mail:
    smtp:
      host: ${MAIL_HOST:smtp.gmail.com}
      port: ${MAIL_PORT:465}
      ssl-trust: ${MAIL_SSL_TRUST:${MAIL_HOST:smtp.gmail.com}}

    otp:
      - email: ${OTP_MAIL_1_EMAIL:${MAIL_USER:}}
        password: ${OTP_MAIL_1_PASSWORD:${MAIL_PASS:}}
      - email: ${OTP_MAIL_2_EMAIL:}
