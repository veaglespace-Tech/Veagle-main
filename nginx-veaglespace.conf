# ============================================
# NGINX REVERSE PROXY CONFIGURATION
# For Hostinger VPS: 82.112.237.155
# Domain: veaglespace.com
# ============================================
# Installation:
# 1. Copy this file to: /etc/nginx/sites-available/veaglespace
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/veaglespace /etc/nginx/sites-enabled/veaglespace
# 3. Test: sudo nginx -t
# 4. Reload: sudo systemctl reload nginx
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name veaglespace.com www.veaglespace.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name veaglespace.com www.veaglespace.com;
    
    # ============================================
    # SSL CERTIFICATES (Let's Encrypt)
    # ============================================
    # Generate with: sudo certbot certonly --nginx -d veaglespace.com -d www.veaglespace.com
    ssl_certificate /etc/letsencrypt/live/veaglespace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veaglespace.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # ============================================
    # PROXY SETTINGS
    # ============================================
    
    # API requests → Spring Boot Backend (port 8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # File uploads → Spring Boot Backend (port 8080)
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Everything else → Next.js Frontend (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # ============================================
    # PERFORMANCE & SECURITY
    # ============================================
    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
}
